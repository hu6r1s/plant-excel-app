<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>매입장 목록</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Purchase Ledger</p>
          <h1>정리된 매입장 목록</h1>
          <p class="hero-text">
            저장된 매입 내역을 조회하고 수정하거나 삭제하고, 전체 또는 선택 항목만 엑셀로
            내려받을 수 있습니다.
          </p>
        </div>
        <div class="hero-panel">
          <div class="action-card">
            <p class="section-kicker">Actions</p>
            <h2>빠른 작업</h2>
            <div class="inline-actions stretch">
              <a class="btn" href="/">입력 화면으로</a>
              <button id="refresh-ledger-btn" class="btn primary" type="button">
                <span id="refresh-ledger-label">새로고침</span>
                <span id="refresh-ledger-spinner" class="spinner hidden" aria-hidden="true"></span>
              </button>
            </div>
            <div class="inline-actions stretch">
              <button id="backup-database-btn" class="btn" type="button">
                <span id="backup-database-label">DB 백업</span>
                <span id="backup-database-spinner" class="spinner hidden" aria-hidden="true"></span>
              </button>
            </div>
            <p class="panel-text">
              백업 파일은 프로그램 폴더 기준 <code>backup</code> 폴더에 날짜별
              <code>.db</code> 파일로 저장됩니다.
            </p>
            <p id="ledger-feedback" class="feedback"></p>
          </div>
        </div>
      </header>

      <main>
        <section class="panel">
          <div class="panel-header compact">
            <div>
              <p class="section-kicker">Filter</p>
              <h2>조회 조건</h2>
            </div>
          </div>

          <div class="filter-grid">
            <label class="field-block">
              <span>카테고리</span>
              <select id="ledger-category">
                <option value="all">전체</option>
                <option value="plant">식물</option>
                <option value="material">자재</option>
              </select>
            </label>
            <label class="field-block">
              <span>품목명</span>
              <input id="ledger-name" type="text" placeholder="이름 일부로 바로 검색" />
            </label>
            <label class="field-block">
              <span>정렬</span>
              <select id="ledger-sort">
                <option value="date">저장날짜</option>
                <option value="id">ID</option>
                <option value="name">이름</option>
              </select>
            </label>
            <label class="field-block">
              <span>정렬 방향</span>
              <select id="ledger-direction">
                <option value="desc">내림차순</option>
                <option value="asc">오름차순</option>
              </select>
            </label>
          </div>

          <div class="inline-actions">
            <button id="clear-ledger-filter-btn" class="btn" type="button">필터 초기화</button>
            <button id="export-all-ledger-btn" class="btn" type="button">
              <span id="export-all-ledger-label">전체 엑셀</span>
              <span id="export-all-ledger-spinner" class="spinner hidden" aria-hidden="true"></span>
            </button>
            <button id="export-selected-ledger-btn" class="btn primary" type="button">
              <span id="export-selected-ledger-label">선택 엑셀</span>
              <span
                id="export-selected-ledger-spinner"
                class="spinner hidden"
                aria-hidden="true"
              ></span>
            </button>
            <button id="export-selected-labels-btn" class="btn" type="button">
              <span id="export-selected-labels-label">선택 라벨 엑셀</span>
              <span
                id="export-selected-labels-spinner"
                class="spinner hidden"
                aria-hidden="true"
              ></span>
            </button>
          </div>

          <p id="selection-summary" class="selection-summary">현재 선택된 항목이 없습니다.</p>
        </section>

        <section class="panel panel-wide">
          <div class="panel-header">
            <div>
              <p class="section-kicker">Ledger</p>
              <h2>저장된 내역</h2>
            </div>
          </div>
          <div class="table-wrap">
            <table class="entry-table entry-table-ledger">
              <colgroup>
                <col class="col-check" />
                <col class="col-id" />
                <col class="col-category" />
                <col class="col-date" />
                <col class="col-name" />
                <col class="col-vendor" />
                <col class="col-spec" />
                <col class="col-count" />
                <col class="col-count" />
                <col class="col-price" />
                <col class="col-price" />
                <col class="col-price" />
                <col class="col-actions" />
              </colgroup>
              <thead>
                <tr>
                  <th class="check-col">
                    <input id="select-all-ledger" type="checkbox" aria-label="현재 목록 전체 선택" />
                  </th>
                  <th>ID</th>
                  <th>카테고리</th>
                  <th>저장날짜</th>
                  <th>품목명</th>
                  <th>매입처</th>
                  <th>규격</th>
                  <th>수량</th>
                  <th>매수</th>
                  <th>단가</th>
                  <th>도매가</th>
                  <th>소매가</th>
                  <th>관리</th>
                </tr>
              </thead>
              <tbody id="ledger-body"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="/static/ledger.js"></script>
  </body>
</html>
