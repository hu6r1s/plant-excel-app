<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plant Label Helper</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Local Plant Label Workflow</p>
          <h1>식물 정보를 빠르게 입력하고<br />엑셀까지 바로 정리</h1>
          <p class="hero-text">
            식물 이름과 가격, 수량을 표처럼 빠르게 입력하고 매입 내역 저장과 XLSX 내보내기까지 한 번에 처리할 수
            있습니다.
          </p>
        </div>
        <div class="hero-panel">
          <div class="action-card">
            <p class="section-kicker">Export</p>
            <h2>내보내기</h2>
            <div class="inline-actions stretch">
              <a class="btn" href="/ledger">매입처 목록</a>
              <button id="copy-tsv-btn" class="btn" type="button">데이터 복사</button>
              <button id="save-ledger-btn" class="btn" type="button">
                <span id="save-ledger-label">매입처 추가</span>
                <span id="save-ledger-spinner" class="spinner hidden" aria-hidden="true"></span>
              </button>
              <button id="export-xlsx-btn" class="btn primary" type="button">
                <span id="export-btn-label">XLSX 다운로드</span>
                <span id="export-spinner" class="spinner hidden" aria-hidden="true"></span>
              </button>
            </div>
            <p id="copy-feedback" class="feedback"></p>
          </div>
        </div>
      </header>

      <main class="layout">
        <section class="panel panel-wide">
          <div class="panel-header">
            <div>
              <p class="section-kicker">Bulk Entry</p>
              <h2>입력 테이블</h2>
              <div class="mode-switcher">
                <span class="mode-caption">&#49352; &#54665; &#44592;&#48376;&#44050;</span>
                <div class="mode-toggle" role="group" aria-label="entry mode">
                  <button id="mode-plant-btn" class="btn" type="button">&#49885;&#47932;</button>
                  <button id="mode-material-btn" class="btn" type="button">&#51088;&#51116;</button>
                </div>
                <p id="entry-mode-label" class="mode-description"></p>
              </div>
            </div>
            <div class="toolbar">
              <button id="add-row-btn" class="btn primary" type="button">행 추가</button>
              <button id="duplicate-row-btn" class="btn" type="button">선택 복제</button>
              <button id="delete-row-btn" class="btn danger" type="button">선택 삭제</button>
              <button id="clear-all-table-btn" class="btn danger" type="button">전체 삭제</button>
              <button id="fill-sample-btn" class="btn" type="button">샘플</button>
            </div>
          </div>

          <div class="table-wrap">
            <table class="entry-table entry-table-main">
              <colgroup>
                <col class="col-check" />
                <col class="col-name" />
                <col class="col-vendor" />
                <col class="col-spec" />
                <col class="col-count" />
                <col class="col-count" />
                <col class="col-price" />
                <col class="col-price" />
                <col class="col-price" />
              </colgroup>
              <thead>
                <tr>
                  <th class="check-col">선택</th>
                  <th>품목명</th>
                  <th>매입처</th>
                  <th>규격</th>
                  <th>수량</th>
                  <th>매수</th>
                  <th>단가</th>
                  <th>도매가</th>
                  <th>소매가</th>
                </tr>
              </thead>
              <tbody id="entry-body"></tbody>
            </table>
          </div>
        </section>

        <aside class="side-stack">
          <section class="panel">
            <div class="panel-header compact">
              <div>
                <p class="section-kicker">OCR Ready</p>
                <h2>추후 OCR 입력</h2>
              </div>
            </div>
            <p class="panel-text">
              이미지 영수증에서 품목을 읽어 입력 테이블로 가져올 수 있습니다. 현재는 이미지 OCR만 지원합니다.
            </p>
            <input id="ocr-file-input" type="file" accept=".pdf,image/*" />
            <button id="ocr-preview-btn" class="btn" type="button">
              <span id="ocr-btn-label">글자 가져오기</span>
              <span id="ocr-spinner" class="spinner hidden" aria-hidden="true"></span>
            </button>
            <p id="ocr-feedback" class="feedback"></p>
          </section>
        </aside>
      </main>
    </div>

    <template id="row-template">
      <tr>
        <td class="check-col">
          <input type="checkbox" class="row-select" />
        </td>
        <td><input data-field="name" type="text" placeholder="품목명" /></td>
        <td><input data-field="vendor" type="text" placeholder="매입처" /></td>
        <td><input data-field="spec" type="text" placeholder="예: 12" /></td>
        <td><input data-field="quantity" type="number" min="1" step="1" value="" /></td>
        <td><input data-field="purchase_count" type="number" min="1" step="1" value="" /></td>
        <td><input data-field="cost" type="text" inputmode="decimal" placeholder="10 → 10,000원" /></td>
        <td><input data-field="wholesale" type="text" inputmode="decimal" placeholder="도매가 직접 입력 가능" /></td>
        <td><input data-field="retail" type="text" inputmode="decimal" placeholder="소매가 직접 입력 가능" /></td>
      </tr>
    </template>

    <script src="/static/app.js"></script>
  </body>
</html>
